name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1

      - name: Resolve release version
        id: release-version
        run: |
          version="$(python3 - <<'PY'
          import pathlib, tomllib

          with open(pathlib.Path("Cargo.toml"), "rb") as fh:
              cargo = tomllib.load(fh)

          print(cargo["package"]["version"])
          PY
          )"

          expected_tag="v${version}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}; expected ${expected_tag}" >&2
            exit 1
          fi

          echo "release_tag=${expected_tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary_name: orbi
            asset_name: orbi-linux-x86_64.tar.gz
          - os: macos-latest
            label: macos-arm64
            binary_name: orbi
            asset_name: orbi-macos-arm64.tar.gz
          - os: windows-latest
            label: windows-x86_64
            binary_name: orbi.exe
            asset_name: orbi-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin orbi

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/release/${{ matrix.binary_name }} dist/
          cp README.md dist/
          tar -C dist -czf ${{ matrix.asset_name }} .

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.binary_name }} dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/*
